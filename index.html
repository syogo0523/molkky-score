<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>モルックリケット</title>

<style>

:root{
  --bg:#0f172a;
  --card:#1e293b;
  --sub:#334155;
  --txt:#f8fafc;
  --ca:#3b82f6;
  --cb:#ef4444;
  --green:#22c55e;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.hidden{
  display:none!important;
}

.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}

.title{
  text-align:center;
  font-size:30px;
  font-weight:900;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-size:18px;
  margin-bottom:12px;
}

button{
  border:none;
  border-radius:16px;
  padding:16px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

button:active{
  transform:scale(.98);
}

.primary{
  background:var(--green);
  color:white;
}

.secondary{
  background:var(--sub);
  color:white;
}

.danger{
  background:var(--cb);
  color:white;
}

.large-btn{
  width:100%;
  min-height:64px;
}

.header{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--bg);
  padding-bottom:8px;
}

.status-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.status-box{
  background:var(--card);
  border-radius:18px;
  padding:10px;
  text-align:center;
}

.status-label{
  font-size:12px;
  opacity:.7;
}

.status-value{
  font-size:22px;
  font-weight:900;
}

.current-a{
  color:var(--ca);
}

.current-b{
  color:var(--cb);
}

.scoreboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.score-box{
  border-radius:18px;
  padding:14px;
  text-align:center;
}

.score-a{
  background:var(--ca);
}

.score-b{
  background:var(--cb);
}

.score-name{
  font-size:18px;
  font-weight:700;
}

.score-value{
  font-size:34px;
  font-weight:900;
}

.notice{
  background:#7c2d12;
  color:#fed7aa;
  padding:12px;
  border-radius:16px;
  text-align:center;
  font-weight:800;
  margin-bottom:12px;
}

.section-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:12px;
}

.skittle-board{
  display:grid;
  grid-template-columns:1fr 60px 1fr;
  gap:8px;
  align-items:center;
}

.mark{
  border-radius:14px;
  padding:10px;
  min-height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

.flat{
  background:#475569;
}

.one{
  background:#2563eb;
}

.open{
  background:#22c55e;
  color:black;
}

.closed{
  background:#ef4444;
}

.center-num{
  text-align:center;
  font-size:26px;
  font-weight:900;
}

.number-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.num-btn{
  background:var(--sub);
  color:white;
  min-height:60px;
}

.selected{
  outline:4px solid #22c55e;
}

.toggle-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.confirm-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:18px;
}

.confirm-box{
  width:100%;
  max-width:440px;
  background:var(--card);
  border-radius:24px;
  padding:20px;
}

.confirm-text{
  font-size:20px;
  line-height:1.6;
  white-space:pre-line;
}

.confirm-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:18px;
}

.winner{
  font-size:34px;
  font-weight:900;
  text-align:center;
  margin-bottom:14px;
}

.stats{
  background:#0f172a;
  border-radius:18px;
  padding:14px;
  margin-top:14px;
}

.stat-line{
  margin-bottom:14px;
  line-height:1.7;
}

.undo-wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.small{
  font-size:14px;
  opacity:.8;
}

@media(max-width:600px){

  .score-value{
    font-size:28px;
  }

  .center-num{
    font-size:22px;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- SETUP -->

  <div id="setupScreen">

    <div class="card">

      <div class="title">
        🎯 モルックリケット
      </div>

      <input id="playerAInput" placeholder="プレイヤーA / チーム名">

      <input id="playerBInput" placeholder="プレイヤーB / チーム名">

      <button class="primary large-btn" onclick="startGame()">
        ゲーム開始
      </button>

    </div>

  </div>

  <!-- GAME -->

  <div id="gameScreen" class="hidden">

    <div class="header">

      <div class="status-grid">

        <div class="status-box">
          <div class="status-label">ターン</div>
          <div class="status-value" id="turnText"></div>
        </div>

        <div class="status-box">
          <div class="status-label">投擲</div>
          <div class="status-value">
            <span id="playerText"></span>
          </div>
        </div>

        <div class="status-box">
          <div class="status-label">現在</div>
          <div class="status-value">
            <span id="throwText"></span>
          </div>
        </div>

      </div>

      <div class="scoreboard">

        <div class="score-box score-a">
          <div class="score-name" id="scoreAName"></div>
          <div class="score-value" id="scoreA"></div>
        </div>

        <div class="score-box score-b">
          <div class="score-name" id="scoreBName"></div>
          <div class="score-value" id="scoreB"></div>
        </div>

      </div>

    </div>

    <div id="specialNotice" class="notice hidden">
      先攻1ターン目特殊ルール中<br>
      マークなし / 倒した本数が得点
    </div>

    <!-- BOARD -->

    <div class="card">

      <div class="section-title">
        スキットル状況
      </div>

      <div class="skittle-board" id="board"></div>

    </div>

    <!-- SINGLE -->

    <div class="card">

      <div class="section-title">
        ① 単品的中
      </div>

      <div class="number-grid" id="singleGrid"></div>

      <div class="toggle-grid">

        <button class="secondary" id="normalBtn" onclick="selectHitType('normal')">
          通常<br>
          <span class="small">1マーク</span>
        </button>

        <button class="secondary" id="directBtn" onclick="selectHitType('direct')">
          直当て<br>
          <span class="small">2マーク</span>
        </button>

      </div>

      <div style="margin-top:12px;">
        <button class="primary large-btn" onclick="confirmSingle()">
          単品入力を確定
        </button>
      </div>

    </div>

    <!-- MULTI -->

    <div class="card">

      <div class="section-title">
        ② 複数本的中
      </div>

      <div class="small" style="margin-bottom:12px;">
        倒したスキットルを全て選択
      </div>

      <div class="number-grid" id="multiGrid"></div>

      <div style="margin-top:12px;">
        <button class="primary large-btn" onclick="confirmMulti()">
          複数本入力を確定
        </button>
      </div>

    </div>

    <!-- MISS -->

    <div class="card">

      <div class="section-title">
        ③ ミス / 0点
      </div>

      <button class="danger large-btn" onclick="quickMiss()">
        MISS / 0点
      </button>

    </div>

    <div class="undo-wrap">

      <button class="secondary large-btn" onclick="undo()">
        ↩ ひとつ前に戻る
      </button>

      <button class="danger large-btn" onclick="location.reload()">
        リセット
      </button>

    </div>

  </div>

</div>

<!-- CONFIRM -->

<div class="confirm-overlay hidden" id="confirmModal">

  <div class="confirm-box">

    <div class="confirm-text" id="confirmText"></div>

    <div class="confirm-buttons">

      <button class="secondary" onclick="closeConfirm()">
        戻る
      </button>

      <button class="primary" onclick="executePending()">
        確定
      </button>

    </div>

  </div>

</div>

<!-- RESULT -->

<div class="confirm-overlay hidden" id="winnerModal">

  <div class="confirm-box">

    <div class="winner" id="winnerText"></div>

    <div id="statsArea"></div>

    <button class="primary large-btn" onclick="location.reload()" style="margin-top:16px;">
      新しいゲーム
    </button>

  </div>

</div>

<script>

const nums=[6,7,8,9,10,11,12];

let players=[
  {
    name:"",
    score:0,
    marks:{},
    totalMarks:0,
    throws:0,
    currentMiss:0,
    maxMiss:0
  },
  {
    name:"",
    score:0,
    marks:{},
    totalMarks:0,
    throws:0,
    currentMiss:0,
    maxMiss:0
  }
];

nums.forEach(n=>{
  players[0].marks[n]=0;
  players[1].marks[n]=0;
});

let turn=1;
let currentPlayer=0;
let throwNum=1;

let selectedSingle=null;
let selectedHitType=null;
let selectedMulti=[];

let pendingAction=null;

let history=[];

function startGame(){

  players[0].name=document.getElementById("playerAInput").value.trim() || "プレイヤーA";
  players[1].name=document.getElementById("playerBInput").value.trim() || "プレイヤーB";

  document.getElementById("setupScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  createButtons();
  updateUI();
}

function createButtons(){

  const single=document.getElementById("singleGrid");
  const multi=document.getElementById("multiGrid");

  nums.forEach(n=>{

    const b1=document.createElement("button");
    b1.className="num-btn";
    b1.innerText=n;
    b1.onclick=()=>selectSingle(n,b1);
    single.appendChild(b1);

    const b2=document.createElement("button");
    b2.className="num-btn";
    b2.innerText=n;
    b2.onclick=()=>toggleMulti(n,b2);
    multi.appendChild(b2);

  });

}

function selectSingle(n,btn){

  selectedSingle=n;

  document.querySelectorAll("#singleGrid button").forEach(b=>{
    b.classList.remove("selected");
  });

  btn.classList.add("selected");
}

function selectHitType(type){

  selectedHitType=type;

  document.getElementById("normalBtn").classList.remove("selected");
  document.getElementById("directBtn").classList.remove("selected");

  if(type==="normal"){
    document.getElementById("normalBtn").classList.add("selected");
  }else{
    document.getElementById("directBtn").classList.add("selected");
  }

}

function toggleMulti(n,btn){

  if(selectedMulti.includes(n)){

    selectedMulti=selectedMulti.filter(x=>x!==n);
    btn.classList.remove("selected");

  }else{

    selectedMulti.push(n);
    btn.classList.add("selected");

  }

}

function confirmSingle(){

  if(selectedSingle===null || !selectedHitType){
    alert("入力してください");
    return;
  }

  pendingAction=()=>processSingle(selectedSingle,selectedHitType);

  openConfirm(`
${players[currentPlayer].name}

単品的中

対象: ${selectedSingle}
${selectedHitType==="direct" ? "直当て(2マーク)" : "通常(1マーク)"}

で確定しますか？
`);

}

function confirmMulti(){

  if(selectedMulti.length===0){
    alert("選択してください");
    return;
  }

  pendingAction=()=>processMulti([...selectedMulti]);

  openConfirm(`
${players[currentPlayer].name}

複数本的中

${selectedMulti.join(", ")}

で確定しますか？
`);

}

function quickMiss(){

  pendingAction=()=>{

    saveHistory();

    const p=players[currentPlayer];

    p.throws++;

    p.currentMiss++;

    if(p.currentMiss > p.maxMiss){
      p.maxMiss = p.currentMiss;
    }

    nextThrow();
  };

  openConfirm(`
${players[currentPlayer].name}

MISS / 0点

で確定しますか？
`);

}

function openConfirm(text){

  document.getElementById("confirmText").innerText=text;
  document.getElementById("confirmModal").classList.remove("hidden");

}

function closeConfirm(){

  document.getElementById("confirmModal").classList.add("hidden");

}

function executePending(){

  closeConfirm();

  if(pendingAction){
    pendingAction();
  }

}

function saveHistory(){

  history.push(JSON.stringify({
    players,
    turn,
    currentPlayer,
    throwNum
  }));

}

function undo(){

  if(history.length===0){
    alert("戻れる履歴がありません");
    return;
  }

  const prev=JSON.parse(history.pop());

  players=prev.players;
  turn=prev.turn;
  currentPlayer=prev.currentPlayer;
  throwNum=prev.throwNum;

  updateUI();
}

function isSpecialRule(){

  return turn===1 && currentPlayer===0;

}

function processSingle(num,type){

  saveHistory();

  const p=players[currentPlayer];
  const e=players[1-currentPlayer];

  const value=type==="direct" ? 2 : 1;

  p.throws++;

  // 特殊ルール
  if(isSpecialRule()){

    p.score += value;
    p.currentMiss=0;

    nextThrow();
    return;
  }

  p.totalMarks += value;

  // ==========================================
  // ★ 最重要バグ修正
  // 相手OPEN / 自分1MARK に直当て
  // ==========================================
  if(
    type==="direct" &&
    p.marks[num]===1 &&
    e.marks[num]>=2
  ){

    // 自分がOPEN到達
    // ↓
    // 両者OPEN成立
    // ↓
    // 即CLOSED

    p.marks[num]=2;
    e.marks[num]=2;

    // 残り1マーク分は無効
    // 得点なし

    p.currentMiss=0;

    nextThrow();
    return;
  }

  let remain=value;

  // 自分をOPENへ
  if(p.marks[num] < 2){

    const need=2-p.marks[num];
    const use=Math.min(need,remain);

    p.marks[num]+=use;
    remain-=use;
  }

  // 得点
  if(
    remain>0 &&
    p.marks[num]>=2 &&
    e.marks[num]<2
  ){

    p.score += num * remain;
    remain=0;
  }

  // 相手OPENをクローズ
  if(
    remain>0 &&
    e.marks[num]>=2
  ){

    e.marks[num]-=remain;

    if(e.marks[num]<0){
      e.marks[num]=0;
    }

    remain=0;
  }

  // 両者OPENならCLOSED
  if(
    p.marks[num]>=2 &&
    e.marks[num]>=2
  ){

    p.marks[num]=2;
    e.marks[num]=2;
  }

  p.currentMiss=0;

  nextThrow();
}

function processMulti(list){

  saveHistory();

  const p=players[currentPlayer];
  const e=players[1-currentPlayer];

  p.throws++;

  if(isSpecialRule()){

    p.score += list.length;
    p.currentMiss=0;

    nextThrow();
    return;
  }

  p.totalMarks += list.length;

  let scoreCount=0;

  list.forEach(num=>{

    if(
      p.marks[num]>=2 &&
      e.marks[num]<2
    ){

      scoreCount++;

    }else{

      if(p.marks[num]<2){

        p.marks[num]+=1;

      }else if(e.marks[num]>=2){

        e.marks[num]-=1;

        if(e.marks[num]<0){
          e.marks[num]=0;
        }

      }

    }

    if(
      p.marks[num]>=2 &&
      e.marks[num]>=2
    ){

      p.marks[num]=2;
      e.marks[num]=2;
    }

  });

  p.score += scoreCount;

  p.currentMiss=0;

  nextThrow();
}

function nextThrow(){

  resetSelections();

  if(checkColdWin()){
    return;
  }

  if(throwNum===2){

    throwNum=1;

    if(currentPlayer===1){

      currentPlayer=0;
      turn++;

      if(turn>12){

        finishGame();
        return;
      }

    }else{

      currentPlayer=1;

    }

  }else{

    throwNum=2;

  }

  updateUI();
}

function resetSelections(){

  selectedSingle=null;
  selectedHitType=null;
  selectedMulti=[];

  document.querySelectorAll(".selected").forEach(el=>{
    el.classList.remove("selected");
  });

}

function getStatus(mine,enemy){

  if(mine>=2 && enemy>=2){
    return ["CLOSED","closed"];
  }

  if(mine>=2){
    return ["OPEN","open"];
  }

  if(mine===1){
    return ["1 MARK","one"];
  }

  return ["FLAT","flat"];
}

function updateUI(){

  document.getElementById("turnText").innerText=turn;

  const pName=document.getElementById("playerText");
  const tText=document.getElementById("throwText");

  pName.innerText=players[currentPlayer].name;
  tText.innerText=`${throwNum}投目`;

  pName.className=currentPlayer===0 ? "current-a" : "current-b";
  tText.className=currentPlayer===0 ? "current-a" : "current-b";

  document.getElementById("scoreAName").innerText=players[0].name;
  document.getElementById("scoreBName").innerText=players[1].name;

  document.getElementById("scoreA").innerText=players[0].score;
  document.getElementById("scoreB").innerText=players[1].score;

  document.getElementById("specialNotice")
    .classList.toggle("hidden",!isSpecialRule());

  const board=document.getElementById("board");

  board.innerHTML="";

  nums.forEach(num=>{

    const a=players[0].marks[num];
    const b=players[1].marks[num];

    const left=getStatus(a,b);
    const right=getStatus(b,a);

    board.innerHTML += `
      <div class="mark ${left[1]}">${left[0]}</div>
      <div class="center-num">${num}</div>
      <div class="mark ${right[1]}">${right[0]}</div>
    `;

  });

}

function allOpened(player){

  return nums.every(n=>player.marks[n]>=2);

}

function checkColdWin(){

  for(let i=0;i<2;i++){

    const p=players[i];
    const e=players[1-i];

    if(
      allOpened(p) &&
      p.score >= e.score
    ){

      showWinner(`
🏆 勝利！ 🏆
<br>
${p.name}
`);
      return true;
    }

  }

  return false;
}

function finishGame(){

  if(players[0].score > players[1].score){

    showWinner(`
🏆 勝利！ 🏆
<br>
${players[0].name}
`);

  }else if(players[1].score > players[0].score){

    showWinner(`
🏆 勝利！ 🏆
<br>
${players[1].name}
`);

  }else{

    showWinner(`
🤝 引き分け 🤝
`);

  }

}

function createStatsHTML(){

  return `
    <div class="stats">

      <h3>📊 試合スタッツ</h3>

      <div class="stat-line">

        <strong>${players[0].name}</strong><br>

        平均マーク数:
        ${
          players[0].throws===0
          ? 0
          : (players[0].totalMarks / players[0].throws).toFixed(2)
        }
        <br>

        最大連続MISS:
        ${players[0].maxMiss}

      </div>

      <div class="stat-line">

        <strong>${players[1].name}</strong><br>

        平均マーク数:
        ${
          players[1].throws===0
          ? 0
          : (players[1].totalMarks / players[1].throws).toFixed(2)
        }
        <br>

        最大連続MISS:
        ${players[1].maxMiss}

      </div>

    </div>
  `;

}

function showWinner(text){

  document.getElementById("winnerText").innerHTML=text;

  document.getElementById("statsArea").innerHTML=createStatsHTML();

  document.getElementById("winnerModal")
    .classList.remove("hidden");

}

</script>

</body>
</html>
